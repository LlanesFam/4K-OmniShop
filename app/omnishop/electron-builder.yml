appId: com.4komni.omnishop
productName: OmniShop
compression: maximum
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!node_modules/**/*.md'
  - '!node_modules/**/*.map'
  - '!node_modules/**/*.ts'
  - '!node_modules/**/test/**'
  - '!node_modules/**/tests/**'
  - '!node_modules/**/docs/**'
  - '!node_modules/**/example/**'
  - '!node_modules/**/examples/**'
asarUnpack:
  - resources/**
win:
  executableName: OmniShop
  icon: build/icon.png
  # ── Code Signing (Windows Authenticode) ──────────────────────────────────
  # Set these environment variables in your CI / GitHub Actions secrets:
  #   WIN_CSC_LINK            – base64-encoded .pfx file  (or path to .pfx)
  #   WIN_CSC_KEY_PASSWORD    – password for the .pfx
  # electron-builder picks them up automatically; no extra config needed here.
  # For EV certificates delivered via SSL.com's eSigner cloud service, set:
  #   SSL_COM_USERNAME        – your SSL.com account username
  #   SSL_COM_PASSWORD        – your SSL.com account password
  #   SSL_COM_TOTP_SECRET     – TOTP secret from your SSL.com account
  #   SSL_COM_CREDENTIAL_ID   – credential ID from SSL.com
  # and add the smctl CodeSignTool step before electron-builder in your workflow.
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  include: build/installer.nsh
  license: build/license.txt
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  # ── Notarization (macOS) ─────────────────────────────────────────────────
  # Required env vars in CI / GitHub Actions secrets when setting to true:
  #   CSC_LINK                – base64-encoded .p12 Developer ID certificate
  #   CSC_KEY_PASSWORD        – password for the .p12
  #   APPLE_ID                – your Apple ID email
  #   APPLE_APP_SPECIFIC_PASSWORD – app-specific password (appleid.apple.com)
  #   APPLE_TEAM_ID           – your 10-character Apple Team ID
  notarize: false # ← change to true once enrolled in Apple Developer Program ($99/yr)
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
electronLanguages:
  - en-US
afterPack: build/after-pack.js
publish:
  provider: github
  owner: LlanesFam
  repo: 4K-OmniShop
