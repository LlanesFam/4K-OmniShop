<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>OmniShop</title>
    <!-- Content-Security-Policy
         - script-src: 'unsafe-eval' is required by Vite HMR in dev; apis.google.com is required for Google Sign-In popup.
         - connect-src: permits Firebase Auth, Firestore, and token exchange APIs.
         - frame-src: allows the Google OAuth popup / accounts.google.com iframe.
         - img-src: relaxed so Firebase user photos and CDN assets load.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval' https://apis.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' ws://localhost:* wss://localhost:* https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebase.google.com https://*.firebaseapp.com https://api.cloudinary.com https://res.cloudinary.com https://www.gstatic.com https://*.api.sanity.io https://*.apicdn.sanity.io https://cdn.sanity.io; frame-src 'self' https://accounts.google.com https://*.google.com https://*.firebaseapp.com; worker-src 'self' blob:;"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
